apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: fivejars
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 2 # Never have only 1 pod (no single point of failure)
  maxReplicas: 6 # Scale up to 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # If the average CPU usage of the Spring Boot pods hit 70% more pods are spawned
