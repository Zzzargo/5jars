spring:
  application:
    name: spring_api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: filesystem:/app/migrations

  jackson:
    # camelCase(Java) -> snake_case(JSON)
    property-naming-strategy: SNAKE_CASE
    # allow extra fields on requests
    deserialization:
      fail-on-unknown-properties: false

app:
  cors:
    # TODO: add real domain
    allowed-origins: "https://fivejars.com"
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
